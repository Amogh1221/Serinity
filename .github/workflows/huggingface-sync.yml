name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'Amogh1221/Serinity-Space' with your actual Hugging Face username and Space name
          git remote add space https://Amogh1221:$HF_TOKEN@huggingface.co/spaces/Amogh1221/old-space-name
          # We use --force to overwrite any existing files in that old space
          git push --force space main
