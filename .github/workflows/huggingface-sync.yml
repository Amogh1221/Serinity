name: Test and Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' 
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Requirements.txt
          pip install pytest pytest-asyncio
          
      - name: Run tests
        run: |
          # This will run all tests in the tests/ folder
          pytest tests/

  sync-to-hub:
    needs: test # This ensures deployment ONLY happens if tests pass!
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Automatically pushes to the Amogh1221/serinity space
          git remote add space https://Amogh1221:$HF_TOKEN@huggingface.co/spaces/Amogh1221/serinity
          git push --force space main
